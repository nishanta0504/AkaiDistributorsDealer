<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AKAI — Barcode Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b3e;--navy2:#162250;--accent:#f59e0b;
  --green:#10b981;--red:#ef4444;--white:#fff;
  --muted:#64748b;--border:#d1daf7;--text:#1e293b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--navy);overflow:hidden;
  font-family:'DM Sans',sans-serif;color:var(--white);
  -webkit-tap-highlight-color:transparent;user-select:none}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px 8px;
  background:rgba(0,0,0,.35);
  position:relative;z-index:20;
}
.hdr-logo{
  width:34px;height:34px;min-width:34px;
  background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:var(--navy);
}
.hdr-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1.1}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.7px}
.hdr-status{
  margin-left:auto;display:flex;align-items:center;gap:5px;
  font-size:11px;color:rgba(255,255,255,.5);font-weight:500;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:blink 1.2s infinite}
.dot.green{background:var(--green);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── VIDEO AREA ── */
#videoWrap{
  position:relative;
  width:100%;
  /* height = viewport minus header, controls, log */
  height:calc(100vh - 56px - 130px - 140px);
  min-height:160px;
  background:#000;overflow:hidden;
}
#camVideo{
  width:100%;height:100%;
  object-fit:cover;display:block;
}
/* scan-line */
.sline{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  box-shadow:0 0 10px var(--accent);
  animation:sweep 1.8s ease-in-out infinite;
  z-index:10;pointer-events:none;
}
@keyframes sweep{0%{top:8%}50%{top:88%}100%{top:8%}}

/* corner guides */
.guide{position:absolute;z-index:11;pointer-events:none}
.guide.tl{top:10px;left:10px;border-top:3px solid var(--accent);border-left:3px solid var(--accent);width:28px;height:28px}
.guide.tr{top:10px;right:10px;border-top:3px solid var(--accent);border-right:3px solid var(--accent);width:28px;height:28px}
.guide.bl{bottom:10px;left:10px;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);width:28px;height:28px}
.guide.br{bottom:10px;right:10px;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);width:28px;height:28px}

/* flash overlay */
#flashOverlay{
  position:absolute;inset:0;background:#fff;opacity:0;
  pointer-events:none;z-index:30;transition:opacity .04s;
}
#flashOverlay.flash{opacity:.45}

/* ── CONTROLS ── */
.controls{
  padding:10px 14px 6px;
  display:flex;gap:8px;align-items:center;
  background:rgba(0,0,0,.3);
}
.btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  border:none;border-radius:9px;cursor:pointer;
  transition:transform .1s,opacity .15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.btn:active{transform:scale(.95)}
.btn-green{background:linear-gradient(135deg,#059669,var(--green));color:#fff;
  box-shadow:0 3px 12px rgba(16,185,129,.3)}
.btn-red{background:var(--red);color:#fff}
.btn-amber{background:linear-gradient(135deg,var(--accent),#f97316);color:var(--navy);
  box-shadow:0 3px 12px rgba(245,158,11,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* torch toggle */
#torchBtn{
  flex:0 0 44px;padding:11px;
  background:rgba(255,255,255,.1);border:none;border-radius:9px;
  color:#fff;font-size:18px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#torchBtn.on{background:rgba(245,158,11,.3);color:var(--accent)}

/* ── RESULT / LOG ── */
#resultBox{
  padding:10px 14px 6px;
  background:rgba(0,0,0,.25);
  min-height:60px;max-height:60px;overflow:hidden;
}
.result-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;
  color:rgba(255,255,255,.4);margin-bottom:4px}
#resultText{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  color:var(--accent);min-height:18px;letter-spacing:.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#resultSub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── SCAN LOG ── */
#logBox{
  flex:1;padding:8px 14px;overflow-y:auto;
  background:rgba(0,0,0,.2);
  max-height:140px;min-height:80px;
}
.log-hdr{
  font-size:9px;text-transform:uppercase;letter-spacing:.8px;
  color:rgba(255,255,255,.35);margin-bottom:6px;
  display:flex;align-items:center;justify-content:space-between;
}
.log-item{
  display:flex;align-items:center;gap:8px;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06);
  font-size:12px;
}
.log-item:last-child{border-bottom:none}
.log-uid{flex:1;font-weight:600;color:rgba(255,255,255,.85);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.log-variant{flex:1;color:var(--green);font-weight:600;font-size:11px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{font-size:10px;color:rgba(255,255,255,.3);flex-shrink:0}
.log-empty{font-size:12px;color:rgba(255,255,255,.25);text-align:center;padding:10px}

/* canvas hidden */
#decodeCanvas{display:none}

/* toast */
.toast-wrap{position:fixed;top:60px;right:12px;z-index:999;
  display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{
  background:#1e293b;border-radius:8px;
  padding:9px 13px;display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:500;border-left:3px solid var(--green);
  animation:tIn .2s ease;max-width:260px;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
}
.toast.err{border-color:var(--red)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}

/* loading overlay */
#loadOverlay{
  position:fixed;inset:0;background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:200;
}
#loadOverlay.hidden{display:none}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.15);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--white)}
.load-sub{font-size:11px;color:rgba(255,255,255,.45);text-align:center;max-width:260px}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadOverlay">
  <div class="spinner"></div>
  <div class="load-text">Loading Scanner…</div>
  <div class="load-sub" id="loadMsg">Initialising barcode engine</div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Header -->
<div class="hdr">
  <div class="hdr-logo">AD</div>
  <div>
    <div class="hdr-title">AKAI DISTRIBUTORS</div>
    <div class="hdr-sub">Barcode Scanner</div>
  </div>
  <div class="hdr-status">
    <div class="dot" id="statusDot"></div>
    <span id="statusTxt">Starting…</span>
  </div>
</div>

<!-- Video -->
<div id="videoWrap">
  <video id="camVideo" autoplay playsinline muted></video>
  <div class="sline"></div>
  <div class="guide tl"></div>
  <div class="guide tr"></div>
  <div class="guide bl"></div>
  <div class="guide br"></div>
  <div id="flashOverlay"></div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn btn-amber" id="startBtn" onclick="startCamera()">▶ Start</button>
  <button class="btn btn-red"   id="stopBtn"  onclick="stopCamera()" disabled>■ Stop</button>
  <button class="btn btn-green" id="sendBtn"  onclick="sendLastToApp()" disabled style="font-size:12px">⬆ Add to App</button>
  <button id="torchBtn" onclick="toggleTorch()" title="Torch">🔦</button>
</div>

<!-- Result -->
<div id="resultBox">
  <div class="result-label">Last Scan</div>
  <div id="resultText">—</div>
  <div id="resultSub">Waiting for scan…</div>
</div>

<!-- Log -->
<div id="logBox">
  <div class="log-hdr">
    <span>Scan History</span>
    <span id="logCount">0 scans</span>
  </div>
  <div id="logList"><div class="log-empty">No scans yet</div></div>
</div>

<canvas id="decodeCanvas"></canvas>

<script>
/* ══════════════════════════════════════════════════════════════
   AKAI BARCODE SCANNER — Standalone page
   
   ARCHITECTURE:
   ┌─────────────────────────────────────────────────────────┐
   │  Primary:  Native BarcodeDetector API (Chrome/Android)  │
   │            Runs at 60fps via requestAnimationFrame       │
   │            Handles rotated barcodes natively             │
   │                                                          │
   │  Secondary: 4-rotation canvas trick                      │
   │            Rotates each frame 0°/90°/180°/270° and       │
   │            tries BarcodeDetector on all 4 orientations   │
   │            Solves the rotated barcode problem 100%       │
   │                                                          │
   │  Fallback: ZXing WASM (loaded from CDN)                  │
   │            For browsers without BarcodeDetector          │
   └─────────────────────────────────────────────────────────┘
   
   CLEANING: strips //1 //5 //10 suffixes automatically.
   
   Google Sheets API URL — same as main app:
══════════════════════════════════════════════════════════════ */

const API_URL = "https://script.google.com/macros/s/AKfycbxN1ueHxR9seDLWBPOQffVkYOFInQpexU6W8-wJIJ-Nl82CtgjSBf6Q-gB-517orI_k/exec";

/* ── STATE ── */
let videoStream  = null;
let rafId        = null;
let isScanning   = false;
let scanLock     = false;
let torchOn      = false;
let torchTrack   = null;
let detector     = null;      // BarcodeDetector instance
let zxingReader  = null;      // ZXing fallback
let useZXing     = false;
let scanLog      = [];        // [{uid, variant, time}]
let stockCache   = {};        // uid → {variant, mrp}

/* ── CANVAS for rotation trick ── */
const dc  = document.getElementById("decodeCanvas");
const dct = dc.getContext("2d", { willReadFrequently: true });

/* ── BEEP (scanner chirp) ── */
const beep = (() => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    return () => {
      try {
        const t = ctx.currentTime;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = "square";
        o.frequency.setValueAtTime(1200, t);
        o.frequency.linearRampToValueAtTime(1800, t + 0.08);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.22, t + 0.006);
        g.gain.setValueAtTime(0.22, t + 0.06);
        g.gain.linearRampToValueAtTime(0, t + 0.1);
        o.start(t); o.stop(t + 0.11);
      } catch(e){}
    };
  } catch(e){ return ()=>{}; }
})();

/* ── STRIP //N SUFFIX ── */
function clean(raw) {
  return String(raw || "").trim().replace(/\/\/\d+$/, "").trim();
}

/* ── TOAST ── */
function toast(msg, isErr=false, dur=2400) {
  const w = document.getElementById("toastWrap");
  const d = document.createElement("div");
  d.className = "toast" + (isErr ? " err" : "");
  d.textContent = (isErr ? "❌ " : "✅ ") + msg;
  w.appendChild(d);
  setTimeout(() => { d.style.cssText="opacity:0;transition:.25s"; setTimeout(()=>d.remove(),260); }, dur);
}

/* ── FLASH ── */
function flash() {
  const ov = document.getElementById("flashOverlay");
  ov.classList.add("flash");
  setTimeout(() => ov.classList.remove("flash"), 120);
}

/* ══════════════════════════════════════════════════════════════
   STOCK CACHE — load entire sheet once for instant lookup
══════════════════════════════════════════════════════════════ */
async function loadCache() {
  setLoad("Loading product cache…");
  try {
    const r = await fetch(API_URL + "?type=stockcache");
    const d = await r.json();
    stockCache = {};
    if (Array.isArray(d)) {
      d.forEach(row => {
        if (row.uid) stockCache[String(row.uid).trim()] = { variant: row.variant||"", mrp: Number(row.mrp)||0 };
      });
    }
    const n = Object.keys(stockCache).length;
    toast(n + " products loaded");
    return true;
  } catch(e) {
    toast("Cache load failed — live lookup active", true);
    return false;
  }
}

function lookupUID(uid) {
  const k = String(uid).trim();
  if (stockCache[k]) return Promise.resolve(stockCache[k]);
  return fetch(API_URL + "?uid=" + encodeURIComponent(uid))
    .then(r => r.json())
    .then(d => d.variant ? d : null);
}

/* ══════════════════════════════════════════════════════════════
   BARCODEDETECTOR — with 4-rotation trick for rotated barcodes
   
   The Titan barcode is printed VERTICALLY on a narrow strip.
   When you hold the phone in portrait mode, the barcode's bars
   are HORIZONTAL — most decoders expect vertical bars.
   
   Solution: try all 4 rotations (0°, 90°, 180°, 270°) on each
   frame. One of them will always present bars vertically.
   Cost is minimal — BarcodeDetector is native C++ speed.
══════════════════════════════════════════════════════════════ */
async function initDetector() {
  if (!("BarcodeDetector" in window)) return false;
  try {
    const formats = await BarcodeDetector.getSupportedFormats();
    detector = new BarcodeDetector({ formats });
    return true;
  } catch(e) { return false; }
}

/* Draw video frame onto canvas rotated by `deg` (0/90/180/270) */
function drawRotated(video, deg) {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;
  const swap = (deg === 90 || deg === 270);
  dc.width  = swap ? vh : vw;
  dc.height = swap ? vw : vh;
  dct.save();
  dct.translate(dc.width / 2, dc.height / 2);
  dct.rotate(deg * Math.PI / 180);
  dct.drawImage(video, -vw/2, -vh/2, vw, vh);
  dct.restore();
}

/* Try BarcodeDetector on 4 rotations, return first result found */
async function detectAllRotations(video) {
  for (const deg of [0, 90, 270, 180]) {
    drawRotated(video, deg);
    try {
      const results = await detector.detect(dc);
      if (results.length > 0) return results[0].rawValue;
    } catch(e) {}
  }
  return null;
}

/* ══════════════════════════════════════════════════════════════
   SCAN LOOP — RAF based, ~60fps
══════════════════════════════════════════════════════════════ */
let frameSkip = 0;

function scanLoop() {
  if (!isScanning) return;
  const video = document.getElementById("camVideo");

  // Process every frame when BarcodeDetector is native (fast)
  // Every 2nd frame for ZXing (slower)
  frameSkip++;
  const shouldProcess = useZXing ? (frameSkip % 2 === 0) : true;

  if (shouldProcess && video.readyState >= 2) {
    if (useZXing) {
      scanZXing(video);
    } else {
      detectAllRotations(video).then(raw => {
        if (raw) onResult(raw);
      });
    }
  }

  rafId = requestAnimationFrame(scanLoop);
}

/* ══════════════════════════════════════════════════════════════
   ZXING FALLBACK — for Safari / old browsers
   We lazy-load the ZXing WASM from jsDelivr only if needed.
══════════════════════════════════════════════════════════════ */
async function loadZXing() {
  return new Promise((resolve, reject) => {
    if (window.ZXing) { resolve(); return; }
    const s = document.createElement("script");
    // ZXing browser WASM — most reliable CDN build
    s.src = "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js";
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function initZXing() {
  setLoad("Loading barcode engine (ZXing)…");
  try {
    await loadZXing();
    zxingReader = new ZXingBrowser.BrowserMultiFormatReader(null, {
      delayBetweenScanAttempts: 0,
      delayBetweenScanSuccess: 0,
    });
    useZXing = true;
    return true;
  } catch(e) {
    return false;
  }
}

function scanZXing(video) {
  if (!zxingReader || scanLock) return;
  dc.width  = video.videoWidth  || 640;
  dc.height = video.videoHeight || 480;
  dct.drawImage(video, 0, 0, dc.width, dc.height);

  // Try all 4 rotations with ZXing too
  const angles = [0, 90, 270, 180];
  let tried = 0;

  function tryNext() {
    if (tried >= angles.length) return;
    const deg = angles[tried++];
    drawRotated(video, deg);

    try {
      const imgData = dct.getImageData(0, 0, dc.width, dc.height);
      // ZXing doesn't have a direct imageData API in browser build
      // Use the canvas element directly
      zxingReader.decodeFromCanvas(dc)
        .then(result => {
          if (result) onResult(result.getText());
          else tryNext();
        })
        .catch(() => tryNext());
    } catch(e) { tryNext(); }
  }
  tryNext();
}

/* ══════════════════════════════════════════════════════════════
   RESULT HANDLER
══════════════════════════════════════════════════════════════ */
let lastScannedUID = "";

function sendLastToApp() {
  if (!lastScannedUID) { toast("No scan yet", true); return; }
  // Send to opener (main app) via postMessage
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: "BARCODE_SCAN", uid: lastScannedUID }, "*");
    toast("Sent to app: " + lastScannedUID.substring(0, 20));
    setTimeout(() => window.close(), 800);
  } else {
    // If opened directly (not from main app), copy to clipboard
    navigator.clipboard.writeText(lastScannedUID)
      .then(() => toast("Copied to clipboard: " + lastScannedUID.substring(0, 20)))
      .catch(() => toast("UID: " + lastScannedUID, false, 5000));
  }
}

function onResult(raw) {
  if (scanLock) return;
  const code = clean(raw);
  if (!code) return;

  scanLock = true;
  lastScannedUID = code;
  document.getElementById("sendBtn").disabled = false;
  beep();
  flash();

  document.getElementById("resultText").textContent = code;
  document.getElementById("resultSub").textContent = "Looking up…";

  lookupUID(code)
    .then(data => {
      if (!data || !data.variant) {
        document.getElementById("resultSub").textContent = "⚠ Not in stock sheet";
        toast("Not found: " + code.substring(0, 20), true);
        addLog(code, "— not found —");
      } else {
        document.getElementById("resultSub").textContent = "✅  " + data.variant + "  |  MRP ₹" + data.mrp;
        toast(data.variant + (data.mrp ? "  ₹" + data.mrp : ""));
        addLog(code, data.variant);
      }
    })
    .catch(() => {
      document.getElementById("resultSub").textContent = "❌ Network error";
      toast("Network error", true);
    })
    .finally(() => {
      setTimeout(() => { scanLock = false; }, 1000);
    });
}

/* ── LOG ── */
function addLog(uid, variant) {
  const now = new Date().toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
  scanLog.unshift({ uid, variant, time: now });
  if (scanLog.length > 50) scanLog.pop();

  document.getElementById("logCount").textContent = scanLog.length + " scan" + (scanLog.length !== 1 ? "s" : "");

  const list = document.getElementById("logList");
  list.innerHTML = scanLog.map(s => `
    <div class="log-item">
      <div class="log-uid">${s.uid}</div>
      <div class="log-variant">${s.variant}</div>
      <div class="log-time">${s.time}</div>
    </div>`).join("");
}

/* ══════════════════════════════════════════════════════════════
   CAMERA
══════════════════════════════════════════════════════════════ */
async function startCamera() {
  if (isScanning) return;

  setStatus("Starting…", false);
  document.getElementById("startBtn").disabled = true;

  try {
    // Request highest-res rear camera — more pixels = easier barcode decode
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width:      { ideal: 3840, min: 1280 },
        height:     { ideal: 2160, min: 720 },
        frameRate:  { ideal: 30, min: 15 },
        focusMode:  "continuous"
      }
    });

    const video = document.getElementById("camVideo");
    video.srcObject = videoStream;
    await video.play();

    // Store torch track for later
    torchTrack = videoStream.getVideoTracks()[0];

    isScanning = true;
    document.getElementById("stopBtn").disabled  = false;
    document.getElementById("startBtn").disabled = true;
    setStatus("Scanning", true);

    scanLoop();
  } catch(err) {
    toast("Camera error: " + err.message, true);
    setStatus("Error", false);
    document.getElementById("startBtn").disabled = false;
  }
}

function stopCamera() {
  isScanning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  torchTrack = null; torchOn = false;
  document.getElementById("torchBtn").classList.remove("on");
  document.getElementById("camVideo").srcObject = null;
  document.getElementById("startBtn").disabled = false;
  document.getElementById("stopBtn").disabled  = true;
  setStatus("Stopped", false);
}

/* ── TORCH ── */
async function toggleTorch() {
  if (!torchTrack) { toast("Start camera first", true); return; }
  try {
    torchOn = !torchOn;
    await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById("torchBtn").classList.toggle("on", torchOn);
  } catch(e) {
    toast("Torch not available on this device", true);
    torchOn = false;
  }
}

/* ── UI HELPERS ── */
function setStatus(txt, green) {
  document.getElementById("statusTxt").textContent = txt;
  const dot = document.getElementById("statusDot");
  dot.className = "dot" + (green ? " green" : "");
}
function setLoad(msg) {
  document.getElementById("loadMsg").textContent = msg;
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
(async function init() {
  // 1. Load cache in background
  loadCache();

  // 2. Try native BarcodeDetector
  setLoad("Checking scanner capabilities…");
  const hasNative = await initDetector();

  if (hasNative) {
    setLoad("Native scanner ready ✓");
    document.getElementById("loadMsg").textContent = "Native scanner (fastest)";
  } else {
    // 3. Fallback to ZXing
    const hasZXing = await initZXing();
    if (!hasZXing) {
      document.getElementById("loadMsg").textContent = "⚠ No scanner engine available";
      toast("Barcode engine unavailable", true);
    }
  }

  // Hide loader and auto-start camera
  document.getElementById("loadOverlay").classList.add("hidden");
  setStatus("Ready", false);
  startCamera();
})();
</script>
